# AUTONOMOUS BETTING BOT CONFIG v2.0

bot:
  token: ${TELEGRAM_BOT_TOKEN}
  debug: false

bank:
  initial_balance: 1019
  current_mode: EMERGENCY

modes:
  FROZEN:
    min_ev: 6.0
    micro: 10
    support: 20
    core: 30
    max_daily_bets: 1
  
  EMERGENCY:
    min_ev: 8.0
    micro: 10
    support: 15
    core: 20
    max_daily_bets: 2
  
  NORMAL:
    min_ev: 4.0
    micro: 20
    support: 35
    core: 50
    max_daily_bets: 5
  
  GROWTH:
    min_ev: 3.0
    micro: 25
    support: 40
    core: 60
    max_daily_bets: 8

apis:
  odds:
    key: ${ODDS_API_KEY}
    base_url: https://api.the-odds-api.com/v4
    timeout: 30
  
  perplexity:
    key: ${PERPLEXITY_API_KEY}
    base_url: https://api.perplexity.ai
    model: sonar-online
    timeout: 60

scanner:
  schedule: 0 * * * *
  sports:
    - soccer_epl
    - soccer_italy_serie_a
    - soccer_spain_la_liga
    - basketball_nba
    - basketball_euroleague
    - tennis_atp_french_open
    - tennis_wta_french_open
    - icehockey_nhl
  
  include_expired: false
  min_hours_until: 0.5
  max_hours_until: 336

filters:
  min_ev: 8.0
  max_ev: null
  min_odds: 1.5
  max_odds: 5.0
  min_books: 3
  max_odds_age_minutes: 5
  min_team_winrate: 0.35
  min_matches_history: 10
  
  exclude_markets:
    - team_totals
    - spreads
  
  red_flags:
    injured_key_player: true
    team_not_training: true
    coach_suspended: true
    odds_closing: true
    low_odds: true

perplexity:
  auto_analyze: true
  cache_hours: 24

price_monitor:
  schedule: */15 * * * *
  track_closing_lines: true
  alert_odds_drop: 10
  auto_close_clv_threshold: 25
  notify_on_odds_move: true

auto_settle:
  schedule: */30 * * * *
  auto_close_after_hours: 2
  stop_loss:
    enable: true
    threshold_percent: -15
    action: pause_new_bets

risk:
  max_sport_exposure: 30
  max_match_exposure: 10
  max_team_exposure: 15
  max_daily_exposure: 50
  auto_freeze_drawdown: 20

logging:
  level: INFO
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"
  files:
    main: logs/bot.log
    scanner: logs/scanner.log
    perplexity: logs/perplexity.log
    trades: logs/trades.log
    errors: logs/errors.log
  max_bytes: 10485760
  backup_count: 5

notifications:
  send_on:
    new_bet_placed: true
    bet_settled: true
    position_closed: true
    risk_alert: true
    odds_movement: true
    error: true
  rate_limit_per_hour: 20

storage:
  data_dir: ./data
  reports_dir: ./reports
  logs_dir: ./logs
  backup_interval: 24

reporting:
  daily_report: true
  daily_report_time: "23:00"
  dashboard_update_hours: 6
  track_daily_roi: true

league_factors:
  soccer_epl:
    h2h: 0.88
    spreads: 0.92
    totals: 0.95
    btts: 0.90
    team_totals: 0.93
  
  soccer_italy_serie_a:
    h2h: 0.85
    spreads: 0.90
    totals: 0.94
    btts: 0.88
    team_totals: 0.91
  
  tennis_atp_french_open:
    h2h: 0.82
    spreads: 0.88
    totals: 0.90
  
  icehockey_nhl:
    h2h: 0.90
    spreads: 0.93
    totals: 0.95
  
  default:
    h2h: 1.0
    spreads: 1.0
    totals: 1.0
    btts: 1.0
    team_totals: 1.0
