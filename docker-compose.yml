version: '3.8'

services:
  bot:
    build: .
    container_name: autonomous_betting_bot
    
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ODDS_API_KEY: ${ODDS_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      PYTHONUNBUFFERED: 1
    
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
    
    restart: unless-stopped
